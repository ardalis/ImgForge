<!DOCTYPE html>
<html>
<body style="width:{{ width }}px; height:{{ height }}px; margin:0;
             background-image:url('{{ bg }}'); background-size:cover;
             position:relative; font-family:sans-serif; color:white; overflow:hidden;">
  <h1 style="position:absolute; bottom:40px; left:40px; right:40px;
              font-size:72px; font-weight:900; margin:0;
              text-shadow:3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;">{{ title }}</h1>
  {% for img in overlays %}
  <img src="{{ img.src }}" style="position:absolute; top:20px; right:20px; max-width:140px; {{ img.style }}" />
  {% endfor %}
</body>
</html>
