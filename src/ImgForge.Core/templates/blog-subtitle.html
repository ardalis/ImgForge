<!DOCTYPE html>
<html>
<body style="width:{{ width }}px; height:{{ height }}px; margin:0;
             display:flex; align-items:center; justify-content:center;
             font-family:sans-serif; color:white;">
  <div style="position:absolute; inset:0; background-image:url('{{ bg }}'); background-size:cover; opacity:0.45;"></div>
  <div style="position:absolute; inset:0; background:rgba(0,0,0,0.75);"></div>
  <div style="position:relative; text-align:center; padding:0 80px;">
    <h1 style="font-size:72px; font-weight:900; margin:0;
               text-shadow:0 2px 4px rgba(0,0,0,0.9), 0 0 40px rgba(0,0,0,0.6),
                           2px 2px 0 rgba(0,0,0,0.8), -1px -1px 0 rgba(0,0,0,0.8),
                           1px -1px 0 rgba(0,0,0,0.8), -1px 1px 0 rgba(0,0,0,0.8);">{{ title }}</h1>
    {% if subtitle %}
    <p style="font-size:50px; font-weight:600; margin:28px 0 0;
              text-shadow:0 2px 4px rgba(0,0,0,0.9), 0 0 30px rgba(0,0,0,0.6),
                          2px 2px 0 rgba(0,0,0,0.8), -1px -1px 0 rgba(0,0,0,0.8),
                          1px -1px 0 rgba(0,0,0,0.8), -1px 1px 0 rgba(0,0,0,0.8);">{{ subtitle }}</p>
    {% endif %}
  </div>
  {% for img in overlays %}
  <img src="{{ img.src }}" style="position:absolute; top:20px; left:20px; max-width:120px; {{ img.style }}" />
  {% endfor %}
  {% if headshot %}
  <img src="{{ headshot.src }}" style="position:absolute; bottom:30px; right:40px; max-width:120px; max-height:120px; border-radius:50%; filter:{{ headshot.filter_css }};" />
  {% endif %}
</body>
</html>
