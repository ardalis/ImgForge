<!DOCTYPE html>
<html>
<body style="width:{{ width }}px; height:{{ height }}px; margin:0;
             background-image:url('{{ bg }}'); background-size:cover;
             display:flex; align-items:center; justify-content:center;
             font-family:sans-serif; color:white;">
  <div style="position:absolute; inset:0; background:rgba(0,0,0,0.45);"></div>
  <h1 style="position:relative; font-size:64px; text-align:center; padding:0 80px; text-shadow:0 2px 8px rgba(0,0,0,0.8);">{{ title }}</h1>
  {% for img in overlays %}
  <img src="{{ img.src }}" style="position:absolute; top:20px; left:20px; max-width:120px; {{ img.style }}" />
  {% endfor %}
</body>
</html>
