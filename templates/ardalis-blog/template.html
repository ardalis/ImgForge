<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: {{ width }}px;
      height: {{ height }}px;
      {% if bg != "" %}
      background-color: #0c1a2e;
      background-image: url('{{ bg }}');
      background-size: cover;
      background-position: center;
      {% else %}
      background: linear-gradient(145deg, #0c1a2e 0%, #112240 50%, #0f3460 100%);
      {% endif %}
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      color: white;
      overflow: hidden;
      position: relative;
    }

    /* Dark vignette scrim — ensures text readability over any background */
    .scrim {
      position: absolute;
      inset: 0;
      {% if bg != "" %}
      background:
        radial-gradient(ellipse at center, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.72) 100%),
        linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.25) 45%, rgba(0,0,0,0.65) 100%);
      {% else %}
      background: transparent;
      {% endif %}
    }

    /* Centered title area */
    .content {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10% 12%;
    }

    h1 {
      font-size: clamp(36px, 5.8vw, 80px);
      font-weight: 800;
      line-height: 1.18;
      text-align: center;
      text-shadow:
        0 2px 8px rgba(0, 0, 0, 0.95),
        0 4px 24px rgba(0, 0, 0, 0.75);
      letter-spacing: -0.5px;
      word-break: break-word;
    }

    /* Watermark — always on top, never filtered */
    .watermark {
      position: absolute;
      bottom: 28px;
      right: 32px;
      width: clamp(56px, 6.5vw, 90px);
      height: clamp(56px, 6.5vw, 90px);
      filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.7));
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="scrim"></div>

  <div class="content">
    <h1>{{ title }}</h1>
  </div>

  <img class="watermark" src="ardalis-icon-128x128.png" alt="" />
</body>
</html>
