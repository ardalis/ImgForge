<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: {{ width }}px;
      height: {{ height }}px;
      {% if bg != "" %}
      background-color: #0f172a;
      background-image: url('{{ bg }}');
      background-size: cover;
      background-position: center;
      {% else %}
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 55%, #0f172a 100%);
      {% endif %}
      font-family: 'Segoe UI', Arial, sans-serif;
      color: white;
      overflow: hidden;
      position: relative;
    }

    /* Dark overlay on the right two-thirds; left strip stays lighter */
    .scrim {
      position: absolute;
      inset: 0;
      {% if bg != "" %}
      background: linear-gradient(
        to right,
        rgba(0,0,0,0.85) 0%,
        rgba(0,0,0,0.85) 55%,
        rgba(0,0,0,0.30) 100%
      );
      {% else %}
      background: transparent;
      {% endif %}
    }

    .content {
      position: absolute;
      top: 0;
      left: 0;
      width: 58%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px 56px;
    }

    .eyebrow {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #facc15;         /* amber accent */
      margin-bottom: 20px;
    }

    h1 {
      font-size: 62px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -1.5px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.8);
    }

    .divider {
      width: 72px;
      height: 5px;
      background: #facc15;
      border-radius: 3px;
      margin-top: 32px;
    }

    /* Channel logo / overlay images — bottom-right */
    .overlays {
      position: absolute;
      bottom: 32px;
      right: 32px;
      display: flex;
      align-items: flex-end;
      gap: 12px;
    }

    .overlays img {
      max-height: 80px;
      max-width: 180px;
      object-fit: contain;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.8));
    }
  </style>
</head>
<body>
  <div class="scrim"></div>

  <div class="content">
    <div class="eyebrow">YouTube</div>
    <h1>{{ title }}</h1>
    <div class="divider"></div>
  </div>

  {% if overlays.size > 0 %}
  <div class="overlays">
    {% for img in overlays %}
    <img src="{{ img.src }}" style="{{ img.style }}" />
    {% endfor %}
  </div>
  {% endif %}
</body>
</html>
