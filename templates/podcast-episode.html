<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    /*
     * Podcast Episode Art — 3000×3000
     * Episode title is the hero. Show name anchors the bottom.
     * Designed to read clearly at thumbnail size in podcast apps.
     */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: {{ width }}px;
      height: {{ height }}px;
      {% if bg != "" %}
      background-color: #0c1a2e;
      background-image: url('{{ bg }}');
      background-size: cover;
      background-position: center;
      {% else %}
      background: linear-gradient(145deg, #0c1a2e 0%, #0f2d4a 45%, #17375e 100%);
      {% endif %}
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      color: white;
      overflow: hidden;
      position: relative;
    }

    {% if bg != "" %}
    .scrim {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.65) 0%,
        rgba(0,0,0,0.25) 40%,
        rgba(0,0,0,0.50) 70%,
        rgba(0,0,0,0.85) 100%
      );
    }
    {% endif %}

    /* Subtle noise/texture overlay */
    .texture {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* Amber accent bar on the left */
    .accent-bar {
      position: absolute;
      top: 240px;
      bottom: 240px;
      left: 0;
      width: 28px;
      background: linear-gradient(to bottom, #f59e0b, #d97706);
      border-radius: 0 6px 6px 0;
    }

    .content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 240px 280px 240px 320px;
    }

    .episode-label {
      font-size: 56px;
      font-weight: 600;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: #f59e0b;
      margin-bottom: 80px;
    }

    h1 {
      font-size: 180px;
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -4px;
      text-shadow: 0 8px 48px rgba(0,0,0,0.9);
      margin-bottom: 120px;
      /* Allow up to ~3 lines at this size */
      max-height: 580px;
      overflow: hidden;
    }

    .divider {
      width: 200px;
      height: 6px;
      background: #f59e0b;
      border-radius: 3px;
      margin-bottom: 80px;
    }

    /* Overlay images (show logo / guest avatar) */
    .overlay-row {
      display: flex;
      align-items: center;
      gap: 48px;
      margin-bottom: 80px;
    }

    .overlay-row img {
      max-height: 200px;
      max-width: 400px;
      object-fit: contain;
      filter: drop-shadow(0 4px 16px rgba(0,0,0,0.7));
    }

    /* Show name footer */
    .show-footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 220px;
      background: rgba(0,0,0,0.65);
      border-top: 6px solid #f59e0b;
      display: flex;
      align-items: center;
      padding: 0 280px;
      gap: 32px;
    }

    .show-footer .show-icon {
      font-size: 72px;
    }

    .show-footer .show-name {
      font-size: 72px;
      font-weight: 700;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.90);
    }

    .show-footer .podcast-tag {
      margin-left: auto;
      font-size: 52px;
      font-weight: 600;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }
  </style>
</head>
<body>
  {% if bg != "" %}<div class="scrim"></div>{% endif %}
  <div class="texture"></div>
  <div class="accent-bar"></div>

  <div class="content">
    <div class="episode-label">New Episode</div>
    <h1>{{ title }}</h1>
    <div class="divider"></div>

    {% if overlays.size > 0 %}
    <div class="overlay-row">
      {% for img in overlays %}
      <img src="{{ img.src }}" style="{{ img.style }}" />
      {% endfor %}
    </div>
    {% endif %}
  </div>

  <div class="show-footer">
    <span class="show-icon">🎙️</span>
    <span class="show-name">{{ title }}</span>
    <span class="podcast-tag">Podcast</span>
  </div>
</body>
</html>
