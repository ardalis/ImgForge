<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: {{ width }}px;
      height: {{ height }}px;
      {% if bg != "" %}
      background-color: #0154A4;
      background-image: url('{{ bg }}');
      background-size: cover;
      background-position: center;
      {% else %}
      background: linear-gradient(145deg, #0154A4 0%, #4a8fd4 50%, #96BCE6 100%);
      {% endif %}
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      color: white;
      overflow: hidden;
      position: relative;
    }

    /* Dark vignette scrim — ensures text readability over any background */
    .scrim {
      position: absolute;
      inset: 0;
      {% if bg != "" %}
      background:
        radial-gradient(ellipse at center, rgba(150,188,230,0.15) 0%, rgba(1,84,164,0.72) 100%),
        linear-gradient(to bottom, rgba(1,84,164,0.60) 0%, rgba(150,188,230,0.20) 45%, rgba(1,84,164,0.70) 100%);
      {% else %}
      background: transparent;
      {% endif %}
    }

    /* Left content panel — narrows when headshot is present */
    .content {
      position: absolute;
      top: 0;
      left: 0;
      {% if headshot %}
      width: 58%;
      {% else %}
      width: 100%;
      {% endif %}
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 10% 12%;
    }

    h1 {
      font-size: clamp(48px, 6vw, 72px);
      font-weight: 800;
      line-height: 1.18;
      {% if headshot %}
      text-align: left;
      {% else %}
      text-align: center;
      {% endif %}
      text-shadow:
        0 2px 8px rgba(0, 0, 0, 0.95),
        0 4px 24px rgba(0, 0, 0, 0.75);
      letter-spacing: -0.5px;
      word-break: break-word;
    }

    /* Watermark — always on top, never filtered */
    .watermark {
      position: absolute;
      bottom: 28px;
      right: 32px;
      width: clamp(56px, 6.5vw, 90px);
      height: clamp(56px, 6.5vw, 90px);
      filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.7));
      z-index: 10;
    }

    /* Guest headshot — circular with blue glow matching NimblePros brand */
    {% if headshot %}
    {% assign hs = height | times: 72 | divided_by: 100 %}
    {% assign hs_right = width | divided_by: 22 %}
    .headshot-wrapper {
      position: absolute;
      right: {{ hs_right }}px;
      top: 50%;
      transform: translateY(-50%);
      width: {{ hs }}px;
      height: {{ hs }}px;
    }

    .headshot-ring {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      border: clamp(4px, 0.5vw, 10px) solid rgba(150, 188, 230, 0.65);
      box-shadow:
        0 0 48px rgba(1, 84, 164, 0.55),
        0 0 100px rgba(74, 143, 212, 0.25),
        inset 0 0 24px rgba(0, 0, 0, 0.4);
    }

    .headshot-ring img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    {% endif %}
  </style>
</head>
<body>
  <div class="scrim"></div>

  <div class="content">
    <h1>{{ title }}</h1>
  </div>

  {% if headshot %}
  <div class="headshot-wrapper">
    <div class="headshot-ring">
      <img src="{{ headshot.src }}" style="filter: {{ headshot.filter_css }};" />
    </div>
  </div>
  {% endif %}

  <img class="watermark" src="nimblepros-meeple-watermark-128x128.png" alt="" />
</body>
</html>
