<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: {{ width }}px;
      height: {{ height }}px;
      {% if bg != "" %}
      background-color: #0c1a2e;
      background-image: url('{{ bg }}');
      background-size: cover;
      background-position: center;
      {% else %}
      background: linear-gradient(145deg, #0c1a2e 0%, #112240 50%, #0f3460 100%);
      {% endif %}
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      color: white;
      overflow: hidden;
      position: relative;
    }

    /* Dark vignette scrim — ensures text readability over any background */
    .scrim {
      position: absolute;
      inset: 0;
      {% if bg != "" %}
      background:
        radial-gradient(ellipse at center, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.72) 100%),
        linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.25) 45%, rgba(0,0,0,0.65) 100%);
      {% else %}
      background: transparent;
      {% endif %}
    }

    /* Centered title area */
    .content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 10% 12%;
    }

    h1 {
      font-size: clamp(36px, 5.8vw, 80px);
      font-weight: 800;
      line-height: 1.18;
      text-align: center;
      text-shadow:
        0 2px 8px rgba(0, 0, 0, 0.95),
        0 4px 24px rgba(0, 0, 0, 0.75);
      letter-spacing: -0.5px;
      word-break: break-word;
    }

    .subtitle {
      font-size: clamp(22px, 3.5vw, 50px);
      font-weight: 600;
      line-height: 1.3;
      text-align: center;
      text-shadow:
        0 2px 8px rgba(0, 0, 0, 0.95),
        0 4px 24px rgba(0, 0, 0, 0.75);
      word-break: break-word;
    }

    /* Watermark — always on top, never filtered */
    .watermark {
      position: absolute;
      bottom: 28px;
      right: 32px;
      width: clamp(56px, 6.5vw, 90px);
      height: clamp(56px, 6.5vw, 90px);
      filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.7));
      z-index: 10;
    }

    /* GitHub icon — bottom left corner */
    .github {
      position: absolute;
      bottom: 32px;
      left: 32px;
      width: clamp(40px, 4.5vw, 64px);
      height: clamp(40px, 4.5vw, 64px);
      color: white;
      filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.7));
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="scrim"></div>

  <div class="content">
    <h1>{{ title }}</h1>
    {% if subtitle %}
    <p class="subtitle">{{ subtitle }}</p>
    {% endif %}
  </div>

  <svg class="github" aria-hidden="true" viewBox="0 0 16 16" fill="currentColor">
    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
  </svg>

  <img class="watermark" src="ardalis-icon-128x128.png" alt="" />
</body>
</html>
